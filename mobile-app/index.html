<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LinkedIn Post Agent</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%233b82f6' width='100' height='100'/><text x='50' y='60' font-size='40' fill='white' text-anchor='middle'>P</text></svg>">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>LinkedIn Post Agent</h1>
      <p>Generate posts offline — image, text, SEO tags</p>
      <span class="status" id="status">Offline ready</span>
    </header>

    <main>
      <section class="input-section">
        <label>Topic for your post</label>
        <input type="text" id="topic" placeholder="e.g. AI trends, product launch, team update">
        <select id="postType">
          <option value="thought_leadership">Thought leadership</option>
          <option value="product_highlight">Product highlight</option>
          <option value="tip_insight">Tip / Insight</option>
        </select>
        <button id="generateBtn">Generate Post</button>
      </section>

      <section class="output-section" id="outputSection">
        <h2>Generated Post</h2>
        <div class="output-card">
          <h3>Copy (for LinkedIn)</h3>
          <textarea id="copy" readonly placeholder="Click Generate Post above to create your LinkedIn post."></textarea>
          <button class="copyBtn" data-target="copy">Copy</button>
        </div>
        <div class="output-card">
          <h3>Hashtags & SEO</h3>
          <p id="hashtags"></p>
          <p id="seo"></p>
          <button class="copyBtn" data-target="hashtags">Copy hashtags</button>
        </div>
        <div class="output-card">
          <h3>Optimal time</h3>
          <p id="optimalTime"></p>
        </div>
        <div class="output-card">
          <h3>Image</h3>
          <canvas id="imageCanvas" width="1200" height="627"></canvas>
          <button id="downloadImage">Download image</button>
        </div>
      </section>
    </main>

    <footer>
      <p>LaravisionX · Works offline · Free</p>
    </footer>
  </div>
  <script src="js/app.js?v=2"></script>
</body>
</html>
